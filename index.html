<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>CarbonLite 碳足迹计算器</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;}
        .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 500px; text-align: center;}
        h2 { color: #2c3e50; margin-bottom: 20px; }
        label { display: block; margin: 10px 0 5px; color: #555; font-size: 14px; text-align: left;}
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px;}
        button { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; margin-top: 20px;}
        button:hover { background: #219150; }
        .result { margin-top: 20px; padding: 15px; background: #ecf0f1; border-radius: 6px; font-size: 18px; color: #2c3e50; display: none;}
        .chart-container { margin-top: 20px; display: none; position: relative; height: 300px; width: 100%;}
    </style>
</head>
<body>
    <div class="container">
        <h2>🌍 CarbonLite 计算器</h2>
        <form id="carbonForm">
            <label>家庭月用电量 (kWh)</label>
            <input type="number" id="electricity" step="0.1" value="0">
            <label>天然气用量 (m³)</label>
            <input type="number" id="gas" step="0.1" value="0">
            <label>燃油车行驶里程 (km)</label>
            <input type="number" id="car" step="0.1" value="0">
            <label>牛肉消费量 (kg)</label>
            <input type="number" id="beef" step="0.1" value="0">
            <button type="submit">计算我的碳足迹</button>
        </form>
        
        <div class="result" id="resultBox"></div>
        <div class="chart-container">
            <canvas id="carbonChart"></canvas>
        </div>
    </div>

    <script>
        Chart.register(ChartDataLabels);
        // 排放因子直接写在前端
        const FACTORS = { electricity: 0.5703, gas: 2.16, car: 0.205, beef: 27.0 };
        let myChart = null; 

        document.getElementById('carbonForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const data = {
                electricity: parseFloat(document.getElementById('electricity').value) || 0,
                gas: parseFloat(document.getElementById('gas').value) || 0,
                car: parseFloat(document.getElementById('car').value) || 0,
                beef: parseFloat(document.getElementById('beef').value) || 0
            };

            // 纯前端计算逻辑
            const breakdown = {
                electricity: data.electricity * FACTORS.electricity,
                gas: data.gas * FACTORS.gas,
                car: data.car * FACTORS.car,
                beef: data.beef * FACTORS.beef
            };
            const total = Object.values(breakdown).reduce((a, b) => a + b, 0);
            const vs_avg = (total / 600 * 100).toFixed(1) + "%";

            // 1. 更新文本结果
            const box = document.getElementById('resultBox');
            box.style.display = 'block';
            box.innerHTML = `本月碳排放：<strong>${total.toFixed(2)} kg</strong><br>
                             <span style="font-size:12px; color:#777;">相当于全国人均月均水平的 ${vs_avg}</span>`;

            // 2. 渲染图表
            const chartContainer = document.querySelector('.chart-container');
            chartContainer.style.display = 'block';
            if (myChart) myChart.destroy();

            const ctx = document.getElementById('carbonChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: ['居民用电', '天然气', '燃油车', '牛肉消费'],
                    datasets: [{
                        data: [breakdown.electricity, breakdown.gas, breakdown.car, breakdown.beef],
                        backgroundColor: ['#3498db', '#e67e22', '#9b59b6', '#e74c3c'],
                        borderColor: '#ffffff',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: { display: true, text: '碳足迹构成分析', font: { size: 16, weight: 'bold' }, padding: { bottom: 10 } },
                        legend: { position: 'bottom' },
                        datalabels: {
                            color: '#ffffff', font: { weight: 'bold', size: 12 },
                            formatter: (value, ctx) => {
                                let sum = ctx.dataset.data.reduce((a, b) => a + b, 0);
                                return sum > 0 && (value * 100 / sum) > 5 ? (value * 100 / sum).toFixed(1) + "%" : '';
                            }
                        }
                    }
                }
            });
        });
    </script>
</body>
</html>
